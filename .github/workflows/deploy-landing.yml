name: Deploy Landing page

on:
  push:
    branches:
      - main   # or your deploy branch
      - staging
    paths:
      - 'landing/**'   # only run when landing app changes

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: './landing/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./landing

      - name: Build project
        run: pnpm run build
        working-directory: ./landing
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_CALLBACK_URL: ${{ vars.VITE_CALLBACK_URL }}
          VITE_API_TIMEOUT: ${{ vars.VITE_API_TIMEOUT }}
          VITE_NODE_ENV: ${{ vars.VITE_NODE_ENV }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing/dist/
          server-dir: /   # adjust if needed
